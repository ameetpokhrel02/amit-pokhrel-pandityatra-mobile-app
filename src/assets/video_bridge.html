<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #0a0a0a; transition: opacity 0.5s ease; }
        #local-video { 
            position: absolute; top: 20px; right: 20px; 
            width: 100px; height: 140px; 
            background: #1a1a1a; border-radius: 16px; 
            object-fit: cover; border: 1px solid rgba(255,255,255,0.3); 
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: rgba(255,255,255,0.7); font-size: 14px;
            text-align: center; font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 50;
        }
        #local-video.minimized {
            width: 40px;
            height: 40px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div id="status" class="status">Initializing...</div>

    <script>
        let pc = null;
        let socket = null;
        let localStream = null;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // DRAG LOGIC FOR LOCAL VIDEO
        const localVideo = document.getElementById('local-video');
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        localVideo.addEventListener("touchstart", dragStart, false);
        document.addEventListener("touchend", dragEnd, false);
        document.addEventListener("touchmove", drag, false);

        function dragStart(e) {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
            if (e.target === localVideo) {
                isDragging = true;
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, localVideo);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
        }

        function log(msg) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'log', message: msg }));
        }

        function sendToRN(type, data = {}) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type, ...data }));
        }

        window.initCall = async (roomId, token, wsUrl, isPandit) => {
            try {
                document.getElementById('status').innerText = "Connecting signaling...";
                
                // 1. Signaling
                socket = new WebSocket(`${wsUrl}/ws/video/${roomId}/?token=${token}`);
                
                socket.onopen = () => {
                    log("Signaling connected");
                    sendToRN('signaling_connected');
                    document.getElementById('status').style.display = 'none';
                };

                socket.onmessage = async (e) => {
                    const data = JSON.parse(e.data);
                    handleSignaling(data, isPandit);
                };

                // 2. Media
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = localStream;

                // 3. PeerConnection
                pc = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.send(JSON.stringify({ type: 'ice-candidate', candidate: event.candidate }));
                    }
                };

                pc.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                        sendToRN('remote_stream_added');
                    }
                };

            } catch (err) {
                log("Call Init Error: " + err.message);
                sendToRN('error', { message: err.message });
            }
        };

        async function handleSignaling(data, isPandit) {
            switch (data.type) {
                case 'offer':
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.send(JSON.stringify({ type: 'answer', sdp: answer }));
                    break;
                case 'answer':
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    break;
                case 'ice-candidate':
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    break;
                case 'chat':
                    // Forward incoming chat to React Native
                    sendToRN('chat_received', { 
                        message: data.message, 
                        sender: data.sender, 
                        timestamp: data.timestamp,
                        username: data.username
                    });
                    break;
                case 'participant-joined':
                    if (isPandit) {
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        socket.send(JSON.stringify({ type: 'offer', sdp: offer }));
                    }
                    break;
            }
        }

        window.toggleMic = (enabled) => {
            if (localStream) {
                localStream.getAudioTracks().forEach(t => t.enabled = enabled);
            }
        };

        window.toggleVideo = (enabled) => {
            if (localStream) {
                localStream.getVideoTracks().forEach(t => t.enabled = enabled);
            }
        };

        window.flipCamera = async () => {
            if (!localStream) return;
            
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return;
            
            // For browser-based WebRTC, we need to stop current track and get new one
            // or use specific constraints. In RN WebView, this depends on the browser engine.
            try {
                const currentFacing = videoTrack.getSettings().facingMode;
                const newFacing = (currentFacing === 'user') ? 'environment' : 'user';
                
                videoTrack.stop();
                const newStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: newFacing } 
                });
                const newTrack = newStream.getVideoTracks()[0];
                
                const sender = pc.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
                
                localStream.removeTrack(videoTrack);
                localStream.addTrack(newTrack);
                document.getElementById('local-video').srcObject = localStream;
                
                log("Camera flipped to " + newFacing);
            } catch (err) {
                log("Flip Camera Error: " + err.message);
            }
        };

        window.sendChatMessage = (msg) => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'chat', message: msg }));
            }
        };

        window.toggleHandRaise = (isRaised) => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ 
                    type: 'hand_raise', 
                    isRaised 
                }));
                log(`Hand ${isRaised ? 'raised' : 'lowered'}`);
            }
        };

        window.toggleRecording = (isRecording) => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ 
                    type: 'toggle_recording', 
                    isRecording 
                }));
                log(`Recording ${isRecording ? 'started' : 'stopped'}`);
            }
        };

    </script>
</body>
</html>
